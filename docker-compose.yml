# Local dev stack. `docker compose up` brings the whole thing up.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idraa
      POSTGRES_PASSWORD: idraa
      POSTGRES_DB: idraa
    ports:
      # Loopback-only (I4): Postgres has no business being reachable off-host;
      # the app container reaches it via the compose network regardless.
      - "127.0.0.1:5432:5432"
    volumes:
      - riskflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idraa"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: idraa:dev
    env_file:
      # Injects every UNCOMMENTED line in .env.example (copied to .env) into
      # the app container. required: false means compose does not error if
      # .env is absent (the ${VAR:?...} guards below still enforce the
      # secrets that matter).
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://idraa:idraa@db:5432/idraa
      # SESSION_SECRET MUST be set by the operator (generate via:
      # python -c 'import secrets; print(secrets.token_urlsafe(48))').
      # The ${VAR:?message} syntax makes docker compose refuse to start
      # without it — prevents the "I copied docker-compose.yml and ran it"
      # failure mode where a committed placeholder signs real cookies.
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set in .env or the environment}
      # ENVIRONMENT is explicit so the config guard's env-dependent
      # hardening (32-char minimum secret in prod) is predictable.
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      # Reverse-proxy header trust for uvicorn (bare env var — uvicorn's Config
      # reads FORWARDED_ALLOW_IPS directly when no CLI flag is given). Default
      # mirrors uvicorn's own loopback-only default; operators behind a TLS
      # proxy opt in via .env (see .env.example).
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Exposed on all interfaces for LAN evaluation. Anything internet-facing
      # needs a TLS proxy in front of this port PLUS a firewall — see the
      # FORWARDED_ALLOW_IPS guidance in .env.example.
      - "8000:8000"

volumes:
  riskflow_pgdata:
