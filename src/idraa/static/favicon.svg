<!-- Idraa favicon (issue #59 T1). Static asset — SVG favicons cannot read CSS
     custom properties, so #0F4C81 is hardcoded here as the ONE spec-sanctioned
     exception to the palette-agnostic rule. This MUST be kept in sync with the
     light-theme --color-brand token in src/idraa/static/css/app.css; if that
     token's hex changes (e.g. Phase 3 palette swap), update this file to match. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <path d="M3 7 C 11 8, 12 24, 29 26" fill="none" stroke="#0F4C81" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M3 7 C 11 8, 12 24, 29 26 L 29 29 L 3 29 Z" fill="#0F4C81" opacity=".14"/>
  <circle cx="3" cy="7" r="2.6" fill="#0F4C81"/>
</svg>
